<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyUnivManager Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">MyUnivManager</a>
    <span id="statusBadge" class="badge bg-success ms-3">Live</span>
    <button class="btn btn-outline-light btn-sm ms-auto" id="refreshBtn">Refresh</button>
  </div>
</nav>

<div class="container mt-4">
  <div class="row g-3">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Total Students</h5>
          <p id="countCard" class="card-text display-5">0</p>
        </div>
      </div>
    </div>
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Ajouter étudiant</h5>
          <form id="addForm" class="row g-2">
            <div class="col-sm-6"><input name="num_etudiant" class="form-control" placeholder="Num" required></div>
            <div class="col-sm-6"><input name="nom" class="form-control" placeholder="Nom" required></div>
            <div class="col-sm-6"><input name="prenom" class="form-control" placeholder="Prénom" required></div>
            <div class="col-sm-6"><input name="email" type="email" class="form-control" placeholder="Email" required></div>
            <div class="col-sm-6"><input name="filiere" class="form-control" placeholder="Filière" required></div>
            <div class="col-sm-6"><input name="annee_entree" type="number" class="form-control" placeholder="Année" required></div>
            <div class="col-12 text-end">
              <button class="btn btn-primary" type="submit">Ajouter</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-12">
      <div class="table-responsive">
        <table id="studentsTable" class="table table-striped">
          <thead>
            <tr>
              <th>#</th>
              <th>ID</th>
              <th>Num</th>
              <th>Nom</th>
              <th>Prénom</th>
              <th>Email</th>
              <th>Filière</th>
              <th>Année</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script src="socket-client.js"></script>
<script src="app.js"></script>
</body>
</html>
